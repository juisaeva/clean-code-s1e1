<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body>
  <div class="info">
    <img class="info__img" src="./eisenhower-matrix.jpg">
    <a class="info__btn" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </div>
  <div class="container app">
    <p id="app__add">
      <label for="app__add-task" class="app__label-add">Add Item</label>
      <div class="app__task-wrapper">
        <input id="app__add-task" class="app__input app__input-task  task" type="text">
        <button class="app__btn">Add</button>
      </div>
    </p>
    <h3 class="app__title">Todo</h3>
    <ul class="app__list" id="app__todo">
      <li class="app__list-item">
        <input class="app__input" type="checkbox">
        <label class="task">Pay Bills</label>
        <input type="text" class="app__input  app__input-task  task">
        <button class="app__btn edit">Edit</button>
        <button class="app__btn app__btn--delete"><img src="./remove.svg"></button>
      </li>
      <li class="app__edit-mode app__list-item">
        <input class="app__input" type="checkbox">
        <label class="task">Go Shopping</label>
        <input type="text" value="Go Shopping" class="app__input app__input-task  task">
        <button class="app__btn edit">Save</button>
        <button class="app__btn app__btn--delete"><img src="./remove.svg"></button>
      </li>
    </ul>
    <h3 class="app__title">Completed</h3>
    <ul class="app__list" id="app__done">
      <li class="app__list-item">
        <input class="app__input" type="checkbox" checked>
        <label class="task">See the Doctor</label>
        <input type="text" class="app__input app__input-task task">
        <button class="app__btn edit">Edit</button>
        <button class="app__btn app__btn--delete"><img src="./remove.svg"></button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
